services:
  ollama:
    image: ollama/ollama:latest
    restart: unless-stopped
    environment:
      OLLAMA_HOST: 0.0.0.0:11434
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - pilinszky-net
    gpus: all

  ollama-init:
    image: ollama/ollama:latest
    restart: 'no'
    depends_on:
      ollama:
        condition: service_started
    environment:
      OLLAMA_HOST: http://ollama:11434
      OLLAMA_MODEL_1: ${OLLAMA_MODEL_1:-nomic-embed-text}
      OLLAMA_MODEL_2: ${OLLAMA_MODEL_2:-jobautomation/OpenEuroLLM-Hungarian:latest}
    entrypoint: ["/bin/sh", "/usr/local/bin/ollama-init.sh"]
    volumes:
      - ./ollama-init.sh:/usr/local/bin/ollama-init.sh:ro
    networks:
      - pilinszky-net

  rag-api:
    build:
      context: .
    restart: unless-stopped
    depends_on:
      ollama-init:
        condition: service_completed_successfully
    environment:
      OLLAMA_URL: http://ollama:11434
      COQUI_TOS_AGREED: '1'
      UVICORN_HOST: 0.0.0.0
      UVICORN_PORT: '8000'
    ports:
      - '8000:8000'
    volumes:
      - tts_cache:/root/.local/share/tts
      - rag_chroma:/workspace/pilinszky/backend/chroma_db
    networks:
      - pilinszky-net
    gpus: all

networks:
  pilinszky-net:

volumes:
  ollama_data:
  tts_cache:
  rag_chroma:
